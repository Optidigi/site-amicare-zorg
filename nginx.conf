# Security headers and Permissions-Policy applied site-wide.
# nginx note: add_header at server level is shadowed when a location block
# defines its own add_header — so each location below repeats them.

# script-src includes 'unsafe-inline' so Astro's island-runtime + hydrator
# inline scripts can execute. Static one-pager — no forms, no APIs, no
# user-injected content — XSS surface is effectively nil, so the relaxation
# is acceptable here. Without this, framer-motion components remain at
# initial={{opacity:0}} and stay invisible.
map $sent_http_content_type $csp_header {
  default "default-src 'self'; script-src 'self' 'unsafe-inline'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; font-src 'self'; base-uri 'self'; frame-ancestors 'none'; form-action 'none'";
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css text/xml application/javascript application/json application/xml image/svg+xml;

  # Hashed Astro assets — long cache, immutable.
  location /_astro/ {
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    try_files $uri =404;
  }

  # Other static assets — modest cache.
  location ~* \.(?:jpg|jpeg|png|gif|webp|avif|svg|ico|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    try_files $uri =404;
  }

  # HTML — short cache, full security header set, real 404s on unknown paths.
  location / {
    expires 5m;
    add_header Cache-Control "public, must-revalidate" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "interest-cohort=(), camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy $csp_header always;
    try_files $uri $uri/ $uri.html =404;
  }

  # Astro emits dist/404.html for the /404.astro route.
  error_page 404 /404.html;
  location = /404.html {
    internal;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "interest-cohort=(), camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy $csp_header always;
  }
}
