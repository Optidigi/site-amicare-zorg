server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css text/xml application/javascript application/json application/xml image/svg+xml;

  # Hashed Astro assets — long cache, immutable
  location /_astro/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Other static assets — modest cache
  location ~* \.(?:jpg|jpeg|png|gif|webp|avif|svg|ico|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public";
    try_files $uri =404;
  }

  # HTML — short cache so deploys propagate fast
  location / {
    expires 5m;
    add_header Cache-Control "public, must-revalidate";
    try_files $uri $uri/ $uri.html /index.html;
  }

  # Astro 404 fallback
  error_page 404 /404.html;

  # Security headers
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
